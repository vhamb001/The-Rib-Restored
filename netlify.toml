[build]
  command = "npm run build"
  publish = "out"

# Netlify automatically serves .html files for clean URLs
# (e.g., /about → /about.html, /writings/post → /writings/post.html) 
# so no explicit rewrites are needed for static pages or dynamic slugs.

# Pretty 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
